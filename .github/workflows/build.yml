name: Build Release

on:
  workflow_dispatch:
    inputs:
      build_android:
        description: 'Build Android APK'
        required: true
        default: true
        type: boolean
      build_windows:
        description: 'Build Windows EXE'
        required: true
        default: true
        type: boolean
      build_linux:
        description: 'Build Linux'
        required: false
        default: false
        type: boolean
      build_web:
        description: 'Build Web'
        required: false
        default: false
        type: boolean
      release_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: false
        type: string
  push:
    tags:
      - 'v*'

env:
  FLUTTER_VERSION: '3.41.6'

jobs:
  build-android:
    if: ${{ github.event_name == 'push' || inputs.build_android }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android, i686-linux-android

      - name: Install Flutter Rust Bridge CLI
        run: cargo install flutter_rust_bridge_codegen --version 2.12.0

      - name: Get dependencies
        run: flutter pub get

      - name: Generate Rust FFI bindings
        run: |
          cd native
          cargo build --release
          flutter_rust_bridge_codegen generate

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Build App Bundle (AAB)
        run: flutter build appbundle --release

      - name: Rename artifacts
        run: |
          TAG="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${TAG#v}"
          else
            TAG="${{ inputs.release_tag }}"
          fi
          mkdir -p release-artifacts
          for f in build/app/outputs/flutter-apk/*.apk; do
            basename=$(basename "$f")
            mv "$f" "release-artifacts/cloudreve4_flutter-${TAG}-android-${basename}"
          done
          mv build/app/outputs/bundle/release/app-release.aab "release-artifacts/cloudreve4_flutter-${TAG}-android.aab" || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: release-artifacts/
          retention-days: 60

  build-windows:
    if: ${{ github.event_name == 'push' || inputs.build_windows }}
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Flutter Rust Bridge CLI
        run: cargo install flutter_rust_bridge_codegen --version 2.12.0

      - name: Get dependencies
        run: flutter pub get

      - name: Generate Rust FFI bindings
        shell: bash
        run: |
          cd native
          cargo build --release
          flutter_rust_bridge_codegen generate

      - name: Build Windows
        run: flutter build windows --release

      - name: Package ZIP
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${TAG#v}"
          else
            TAG="${{ inputs.release_tag }}"
          fi
          mkdir -p release-artifacts
          cd build/windows/x64/runner/Release
          7z a -tzip "../../../../../release-artifacts/cloudreve4_flutter-${TAG}-windows.zip" "*"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: release-artifacts/
          retention-days: 60

  build-linux:
    if: ${{ github.event_name == 'push' || inputs.build_linux }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev mpv libmpv-dev liblzma-dev libstdc++-12-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Flutter Rust Bridge CLI
        run: cargo install flutter_rust_bridge_codegen --version 2.12.0

      - name: Get dependencies
        run: flutter pub get

      - name: Generate Rust FFI bindings
        run: |
          cd native
          cargo build --release
          flutter_rust_bridge_codegen generate

      - name: Build Linux
        run: flutter build linux --release

      - name: Package TAR.GZ
        run: |
          TAG="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${TAG#v}"
          else
            TAG="${{ inputs.release_tag }}"
          fi
          mkdir -p release-artifacts
          cd build/linux/x64/release/bundle
          tar -czvf "../../../../../release-artifacts/cloudreve4_flutter-${TAG}-linux.tar.gz" *

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-app
          path: release-artifacts/
          retention-days: 60

  build-web:
    if: ${{ github.event_name == 'push' || inputs.build_web }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release

      - name: Package ZIP
        run: |
          TAG="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${TAG#v}"
          else
            TAG="${{ inputs.release_tag }}"
          fi
          mkdir -p release-artifacts
          cd build/web
          zip -r "../../release-artifacts/cloudreve4_flutter-${TAG}-web.zip" *

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: release-artifacts/
          retention-days: 60

  create-release:
    needs: [build-android, build-windows, build-linux, build-web]
    if: ${{ always() && (github.event_name == 'push' || inputs.release_tag != '') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check Tag (push event)
        if: github.event_name == 'push'
        run: echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Check Tag (dispatch event)
        if: github.event_name != 'push'
        run: echo "RELEASE_TAG=${{ inputs.release_tag }}" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Generate Release Notes
        run: |
          cat > release-notes.md << 'RELEOF'
          ## Cloudreve4 Flutter ${{ env.RELEASE_TAG }}

          ### ✨ 下载说明
          - **Android**: 下载 `*-android-*.apk` 文件安装
          - **Windows**: 下载 `*-windows.zip` 文件解压后运行
          - **Linux**: 下载 `*-linux.tar.gz` 文件解压后运行
          - **Web**: 下载 `*-web.zip` 文件部署到 Web 服务器

          ### 🔄 更新内容
          请查看 [CHANGELOG](https://github.com/${{ github.repository }}/commits/${{ env.RELEASE_TAG }}) 了解此版本的详细更新。
          RELEOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          body_path: release-notes.md
          files: |
            artifacts/*.apk
            artifacts/*.aab
            artifacts/*.zip
            artifacts/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false